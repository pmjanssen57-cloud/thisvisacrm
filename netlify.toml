[build]
  command = "yarn build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.19.0"
  YARN_FLAGS = "--no-ignore-optional --non-interactive --no-progress"

[dev]
  command = "yarn dev:vite"
  targetPort = 5173
  publish = "dist"
  functions = "netlify/functions"

[functions."backup-create-background"]
  included_files = ["netlify/database/migrations/*.sql"]

[[redirects]]
  from = "/api/crm"
  to = "/.netlify/functions/crm"
  status = 200
  force = true

[[redirects]]
  from = "/api/ping"
  to = "/.netlify/functions/ping"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200


[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self' https://www.turnerhopkinsimmigration.co.nz https://turnerhopkinsimmigration.co.nz"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[functions."commercial-reminders"]
  schedule = "0 19 * * *"
